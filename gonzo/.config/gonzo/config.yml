# File input configuration
# files:
#   - "/var/log/app.log"
#   - "/var/log/error.log"
#   - "/var/log/*.log" # Glob patterns supported
follow: false # Enable follow mode (like tail -f)
# Update frequency for dashboard refresh
update-interval: 500ms
# Buffer sizes
log-buffer: 2000
memory-size: 15000
# UI customization
skin: gruvbox # Choose from: default, dracula, nord, monokai, github-light, etc.
# Additional stop words to filter from analysis
stop-words:
  - "log"
  - "message"
  - "debug"
  - "info"
  - "warning"
  - "error"
# Development/testing
test-mode: false
# AI configuration
ai-model: "gpt-4"
